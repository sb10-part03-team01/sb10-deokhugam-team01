spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: never # schema.sql 무시. H2 호환 스키마 자동 생성

deokhugam:
  storage:
    type: local
    local:
      root-path: .deokhugam/storage-test

logging:
  level:
    com.team01.deokhugam: debug
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace
